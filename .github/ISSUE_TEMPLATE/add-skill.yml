name: Add Skill
description: Add a new skill category or item to your portfolio
title: "[Skill] "
labels: ["skill"]
body:
  - type: markdown
    attributes:
      value: "Form ini digunakan untuk menambahkan keahlian (skill) baru ke dalam dashboard visual."
  - type: dropdown
    id: category
    attributes:
      label: Category
      description: "Kategori kelompok keahlian."
      options:
        - backend
        - frontend
        - mobile
        - tools
    validations:
      required: true
  - type: input
    id: color
    attributes:
      label: Color (Opsional)
      description: "Kode warna hex khusus untuk brand keahlian ini (Opsional, bawaan: #007acc)."
      placeholder: "Contoh: #FF2D20 (Laravel), #02569B (Flutter)"

  - type: textarea
    id: icon
    attributes:
      label: Icon
      description: "Tarik dan lepas (drag & drop) ikon/gambar keahlian Anda ke kotak ini untuk mengunggahnya secara otomatis ke server GitHub."
      placeholder: "Tarik ikon atau gambar ke sini..."

