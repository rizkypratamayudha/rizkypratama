name: Add Skill
description: Add a new skill category or item to your portfolio
title: "[Skill] "
labels: ["skill"]
body:
  - type: markdown
    attributes:
      value: |
        Form ini digunakan untuk menambahkan keahlian (skill) baru ke dalam dashboard visual.
  - type: dropdown
    id: category
    attributes:
      label: Category
      description: Kategori kelompok keahlian.
      options:
        - backend
        - frontend
        - mobile
        - tools
    validations:
      required: true
  - type: input
    id: color
    attributes:
      label: Color
      description: Kode warna hex khusus untuk brand keahlian ini.
      placeholder: Contoh: #FF2D20 (Laravel), #02569B (Flutter)
    validations:
      required: true
